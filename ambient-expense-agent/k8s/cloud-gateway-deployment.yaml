apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-api-gateway-deployment
  namespace: expense-production
  labels:
    app: cloud-api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloud-api-gateway
  template:
    metadata:
      labels:
        app: cloud-api-gateway
    spec:
      containers:
      - name: api-gateway
        image: gcr.io/expense-production/cloud-api-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
          name: http-port
        env:
        - name: GCP_PROJECT
          value: "expense-production"
        - name: PUBSUB_INGEST_TOPIC
          value: "projects/expense-production/topics/transaction-ingest"
        - name: DIAGNOSTICS_PORT
          value: "8080"
        resources:
          limits:
            cpu: "1.0"
            memory: 512Mi
          requests:
            cpu: "0.25"
            memory: 256Mi
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL

---
apiVersion: v1
kind: Service
metadata:
  name: cloud-api-gateway-service
  namespace: expense-production
  labels:
    app: cloud-api-gateway
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 5000
    protocol: TCP
    name: http
  selector:
    app: cloud-api-gateway
